DataCase: Data_ISONE_PCM_250bus/   # Input data folder under the case directory
model_mode: PCM                    # Model type: GTEP or PCM
resource_aggregation: 0            # 1 aggregate resources before model build; 0 use full input resources
representative_day!: 0             # 1 representative-day formulation; 0 full chronological hours
flexible_demand: 0                 # 1 enable demand response formulation; 0 disable
clean_energy_policy: 1             # 1 enforce RPS/clean-energy constraints; 0 disable
carbon_policy: 0                   # 0 none; 1 state cap; 2 cap-and-trade
operation_reserve_mode: 0          # PCM: 0 none; 1 REG+SPIN; 2 REG+SPIN+NSPIN
network_model: 2                   # Start with nodal DCOPF-angle for easier debugging
transmission_loss: 0               # Keep first draft lossless
reference_bus: 1                   # Reference bus index/label for nodal price decomposition
inv_dcs_bin: 0                     # 1 integer investment decisions; 0 continuous/relaxed
time_periods:                      # Seasonal windows retained for compatibility
    1 : (3, 20, 6, 20)
    2 : (6, 21, 9, 21)
    3 : (9, 22, 12, 20)
    4 : (12, 21, 3, 19)
unit_commitment: 0                 # Start with LP relaxation for first case assembly/debug
write_shadow_prices: 0             # Turn on later if needed for UC dual recovery
summary_table: 1                   # Write Analysis/Summary_*.csv for dashboard/debugging
solver: gurobi                     # Preferred fast LP/MIP solver when license is available
debug: 0                           # 0 off; 1 conflict refiner; 2 penalty-based debug
