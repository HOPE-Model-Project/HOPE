# Clp Solver parameters https://github.com/jump-dev/Clp.jl
# Common solver settings
Feasib_Tol: 1e-5              # Primal/Dual feasibility tolerance
TimeLimit: -1.0               # Negative means no time limit
Pre_Solve: 0                  # 0 automatic, 1 disable presolve
Method: 5                     # 0 dual simplex, 1 primal simplex, 5 automatic

# Clp-specific solver settings
DualObjectiveLimit: 1e308
MaximumIterations: 2147483647
LogLevel: 1
InfeasibleReturn: 0
Scaling: 3
Perturbation: 100
