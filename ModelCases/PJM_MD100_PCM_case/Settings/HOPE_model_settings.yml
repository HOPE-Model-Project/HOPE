DataCase: Data_PJM_PCM_subzones/  # Input data folder under the case directory
model_mode: PCM                   # Model type: GTEP or PCM
aggregated!: 1                    # 1 use aggregated technology data; 0 use full input technologies
endogenous_rep_day: 0             # 1 build representative periods from full chronology using HOPE_rep_day_settings.yml; 0 otherwise
external_rep_day: 0               # 1 use user-provided representative periods and weights; 0 otherwise
flexible_demand: 0                # 1 enable demand response formulation; 0 disable
clean_energy_policy: 1            # 1 enforce RPS/clean-energy constraints; 0 disable
carbon_policy: 1                  # 0 none; 1 state cap; 2 cap-and-trade
operation_reserve_mode: 0         # PCM: 0 none; 1 REG+SPIN; 2 REG+SPIN+NSPIN
network_model: 1                  # 0 none; 1 zonal transport; 2 nodal DCOPF-angle; 3 nodal DCOPF-PTDF
transmission_loss: 0              # 0 lossless network; 1 piecewise-linear transmission losses (PCM supports network_model 1/2)
reference_bus: 1                  # Reference bus index/label for nodal price decomposition
inv_dcs_bin: 0                    # 1 integer investment decisions; 0 continuous/relaxed
unit_commitment: 0                # PCM UC mode: 0 no UC; 1 integer UC; 2 convexified UC
write_shadow_prices: 0            # 1 MILP->fixed-LP re-solve for dual/LMP (PCM requires UC=1; GTEP requires inv_dcs_bin=1); 0 disable
summary_table: 0                 # 1 generate Analysis/Summary_*.csv tables; 0 disable
solver: cbc                       # Solver name: cbc, clp, highs, scip, cplex, gurobi
debug: 0                          # 0 off; 1 conflict refiner; 2 penalty-based debug
