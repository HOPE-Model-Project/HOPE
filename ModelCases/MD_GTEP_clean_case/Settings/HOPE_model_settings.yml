DataCase: Data_100RPS/            #String, the folder name of data, default Data/ GTEP example: "Data_100RPS/"; PCM example: "Data_PCM2035/"
model_mode: GTEP                  #String,"GTEP" or "PCM" or ...
resource_aggregation: 1           # 1 aggregate resources before model build; 0 use full input resources
endogenous_rep_day: 1             #Binary,1 use endogenous representative-day selection; 0 Does Not
external_rep_day: 0               #Binary,1 use user-provided representative periods and weights; 0 Does Not
flexible_demand: 1                #Binary, 1 enable DR backlog formulation; 0 disable DR
inv_dcs_bin: 0                    #Binary, 1 use integer variable for investment decisions; 0 Does Not
carbon_policy: 1                  #Int, 0 no carbon policy; 1 Option A state emissions cap; 2 Option B cap-and-trade
clean_energy_policy: 1            #Int, 0 turn off RPS constraints; 1 turn on RPS constraints
planning_reserve_mode: 1          #Int, 0 disable RA; 1 system-level RA; 2 zonal-level RA
operation_reserve_mode: 0         #Int, 0 disable operation reserve; 1 enable SPIN reserve constraints (GTEP only)
transmission_loss: 0              # 0 lossless transport; 1 piecewise-linear transmission losses
storage_ld_duration_hours: 12     #Float, duration threshold (MWh/MW) for long-duration storage subset S_LD (rep-day mode only)
write_shadow_prices: 0            # 1 MILP->fixed-LP re-solve for dual/LMP (PCM requires UC=1; GTEP requires inv_dcs_bin=1); 0 disable
summary_table: 0                 # 1 generate Analysis/Summary_*.csv tables; 0 disable
save_postprocess_snapshot: 0      #Int, 0 do not save; 1 save minimal snapshot for later postprocessing such as EREC; 2 save full snapshot with additional solved-run details
solver: cbc                       #String, solver: cbc, clp, scip, highs, cplex, gurobi
debug: 0                          #Float, flag for turning on the Method of Debug, 0 = not active; 1 = active conflict method; 2 = active penalty method
#(please refer to https://jump.dev/JuMP.jl/stable/tutorials/getting_started/debugging/, https://jump.dev/JuMP.jl/stable/manual/solutions/#Conflicts for more detal)
