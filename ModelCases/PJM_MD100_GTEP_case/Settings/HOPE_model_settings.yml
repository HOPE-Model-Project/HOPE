DataCase: Data_PJM_GTEP_subzones/ # Input data folder under the case directory
model_mode: GTEP                  # Model type: GTEP or PCM
aggregated!: 1                    # 1 use aggregated technology data; 0 use full input technologies
representative_day!: 1            # 1 representative-day formulation; 0 full chronological hours
inv_dcs_bin: 0                    # 1 integer investment decisions; 0 continuous/relaxed
operation_reserve_mode: 0         # GTEP: 0 none; 1 SPIN reserve
transmission_loss: 0              # 0 lossless transport; 1 piecewise-linear transmission losses
write_shadow_prices: 0            # 1 MILP->fixed-LP re-solve for dual/LMP (PCM requires UC=1; GTEP requires inv_dcs_bin=1); 0 disable
summary_table: 0                 # 1 generate Analysis/Summary_*.csv tables; 0 disable
time_periods:                     # Representative-day seasonal windows
    1 : (3, 20, 6, 20)            # March 20th to June 20th; 1 spring
    2 : (6, 21, 9, 21)            # June 21st to September 21st; 2 summer
    3 : (9, 22, 12, 20)           # September 22nd to December 20th; 3 fall
    4 : (12, 21, 3, 19)           # December 21st to March 19th; 4 winter
solver: cbc                       # Solver name: cbc, clp, highs, scip, cplex, gurobi
debug: 0                          # 0 off; 1 conflict refiner; 2 penalty-based debug
