write_aggregation_audit: 1        #Binary,1 write aggregation mapping/summary audit CSVs to output; 0 disable
grouping_keys:
  - Zone
  - Type
  - Flag_RET
  - Flag_mustrun
  - Flag_VRE
  - Flag_thermal
pcm_additional_grouping_keys:
  - Flag_UC
clustered_thermal_commitment: 1   #Binary,1 in PCM with unit_commitment and resource_aggregation, aggregated thermal UC resources use unit-count clustered commitment; 0 keeps single-unit-style UC on aggregated rows
planning_clustering: 0            #Binary,1 split large keyed aggregation groups into planning-oriented sub-clusters using the feature list below
planning_feature_columns:
  - Cost ($/MWh)
  - FOR
  - CC
  - AF
  - RU
  - RD
  - Pmax (MW)
  - Pmin (MW)
planning_target_cluster_size: 4
planning_max_clusters_per_group: 4
normalize_planning_features: 1
aggregate_technologies: []
keep_separate_technologies: []
